id: conductor
type: orchestrator
version: "1.0.0"
capabilities:
  - plan_workflow
  - route_messages
  - schedule
  - aggregate_results
  - auto_trigger_workflow
  - activate_agents
  - coordinate_claims
mailbox_in: queue.conductor.in
mailbox_out: queue.conductor.out
scheduler:
  poll_interval: null
  cron_rules:
    - "0 9 * * *" # daily_audit
    - "0 8 * * MON" # weekly_report
triggers:
  - audit_project
  - connector_event
  - realtime_event
  - task_claimed
  - task_released
state:
  auth: {}
  cursor:
    last_event_offset: null
  cache:
    execution_phase: phase_a_dev_realtime_hardening
    api_profile: legacy_external_dev_only
  metrics:
    dispatch_latency_ms: {}
    claim_conflicts: {}
health:
  status: ok
  last_heartbeat: null
policies:
  rate_limit: {}
  retry:
    max_attempts: 2
    backoff_seconds: 5
  circuit_breaker:
    failure_threshold: 5
    reset_timeout_seconds: 60
  auth_scope: {}
guardrails:
  prevent_cycles: true
  max_ttl: 16
  enforce_task_claim_before_execute: true
  stale_claim_timeout_seconds: 90
  allow_production_secrets_in_test_phase: false
  allow_unsandboxed_external_attack_testing: false
contracts:
  input_schema:
    profile: search_space_collapse_v1
  output_schema:
    profile: deny_rule_update_v1
  error_schema: {}
